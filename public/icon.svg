<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title id="title">MediPrisma prism icon</title>
  <defs>
    <linearGradient id="facetTopLeft" x1="60" y1="24" x2="145" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c7edf5"/>
      <stop offset="1" stop-color="#7fc2d8"/>
    </linearGradient>
    <linearGradient id="facetTopRight" x1="128" y1="14" x2="214" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fc7dd"/>
      <stop offset="1" stop-color="#3f86b2"/>
    </linearGradient>
    <linearGradient id="facetBottomLeft" x1="18" y1="156" x2="128" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3d95b7"/>
      <stop offset="1" stop-color="#23688f"/>
    </linearGradient>
    <linearGradient id="facetBottomRight" x1="128" y1="158" x2="238" y2="244" gradientUnits="userSpaceOnUse">
